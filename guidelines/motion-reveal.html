<!-- @dsCard group="Motion" viewport="700x220" name="Reveal architecture" subtitle="One entrance: rise + fade + de-blur · staggered" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);padding:24px;font-family:var(--font-mono);overflow:hidden}
 .lbl{color:var(--text-muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 16px}
 .row{display:flex;gap:12px}
 .chip{flex:1;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface-card);padding:18px 14px;font-size:11px;letter-spacing:.06em;color:var(--text-secondary)}
 .chip b{display:block;color:var(--accent);font-size:22px;margin-bottom:6px}
 /* loop the reveal so the card visibly demonstrates the system */
 .demo{animation:demo 3.6s var(--ease-out) infinite}
 .demo .chip{opacity:0;transform:translateY(26px);filter:blur(8px);animation:rev 3.6s var(--ease-out) infinite}
 .demo .chip:nth-child(2){animation-delay:.12s}
 .demo .chip:nth-child(3){animation-delay:.24s}
 .demo .chip:nth-child(4){animation-delay:.36s}
 @keyframes rev{0%,8%{opacity:0;transform:translateY(26px);filter:blur(8px)}28%,72%{opacity:1;transform:none;filter:none}92%,100%{opacity:0;transform:translateY(26px);filter:blur(8px)}}
 @keyframes demo{0%,100%{}}
 @media (prefers-reduced-motion:reduce){.demo .chip{animation:none;opacity:1;transform:none;filter:none}}
</style></head><body>
 <p class="lbl">[data-reveal] + .is-in · ease-out(0.16,1,0.3,1) · 800ms · stagger 70ms</p>
 <div class="row demo">
  <div class="chip"><b>↑</b>rise + fade</div>
  <div class="chip"><b>⤺</b>de-blur 8px</div>
  <div class="chip"><b>—</b>shared easing</div>
  <div class="chip"><b>×4</b>stagger --i</div>
 </div>
</body></html>
