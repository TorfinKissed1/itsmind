<!-- @dsCard group="Brand" viewport="700x230" name="Imagery & mood" subtitle="Ink + neon abstraction, near-monochrome with accent injected" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);padding:18px;font-family:var(--font-mono)}
 .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
 .fig{position:relative;aspect-ratio:16/10;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
 .fig img{width:100%;height:100%;object-fit:cover;filter:grayscale(.4) contrast(1.05)}
 .fig::after{content:"";position:absolute;inset:0;background:radial-gradient(70% 60% at 70% 10%,var(--accent-wash),transparent 60%)}
 .t{position:absolute;left:8px;bottom:7px;z-index:2;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--fog-100);text-shadow:0 1px 4px #000}
 .cap{margin:12px 2px 0;color:var(--text-muted);font-size:10px;letter-spacing:.08em}
</style></head><body>
 <div class="grid">
  <div class="fig"><img src="../assets/imagery/abstract-ink.jpg" alt=""/><span class="t">ink abstraction</span></div>
  <div class="fig"><img src="../assets/imagery/neon-banner.jpg" alt=""/><span class="t">neon hero</span></div>
  <div class="fig"><img src="../assets/imagery/work-tex-3.jpg" alt=""/><span class="t">duotone work</span></div>
 </div>
 <p class="cap">Full-bleed, high-contrast, near-monochrome → colour on hover. Accent injected as a glow, never as flat fields.</p>
</body></html>
