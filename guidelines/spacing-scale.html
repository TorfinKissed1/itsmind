<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);padding:22px 24px;font-family:var(--font-mono)}
 .row{display:flex;align-items:flex-end;gap:14px}
 .c{display:flex;flex-direction:column;align-items:center;gap:8px}
 .b{background:var(--accent);width:24px;border-radius:2px}
 .n{font-size:9.5px;color:var(--text-muted);letter-spacing:.06em}
</style></head><body>
 <div class="row">
  <div class="c"><div class="b" style="height:8px"></div><span class="n">2 · 8</span></div>
  <div class="c"><div class="b" style="height:16px"></div><span class="n">4 · 16</span></div>
  <div class="c"><div class="b" style="height:24px"></div><span class="n">5 · 24</span></div>
  <div class="c"><div class="b" style="height:32px"></div><span class="n">6 · 32</span></div>
  <div class="c"><div class="b" style="height:48px"></div><span class="n">8 · 48</span></div>
  <div class="c"><div class="b" style="height:64px"></div><span class="n">9 · 64</span></div>
  <div class="c"><div class="b" style="height:80px"></div><span class="n">10 · 80</span></div>
 </div>
</body></html>
