<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Restrained & techy — sm → pill" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);padding:22px 24px;font-family:var(--font-mono)}
 .row{display:flex;gap:18px;align-items:flex-end}
 .c{display:flex;flex-direction:column;align-items:center;gap:8px}
 .b{width:74px;height:54px;background:var(--surface-card);border:1px solid var(--accent);border-bottom:2px solid var(--accent)}
 .n{font-size:9.5px;color:var(--text-muted);letter-spacing:.06em}
</style></head><body>
 <div class="row">
  <div class="c"><div class="b" style="border-radius:var(--radius-xs)"></div><span class="n">xs · 2</span></div>
  <div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><span class="n">sm · 4</span></div>
  <div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><span class="n">md · 8</span></div>
  <div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><span class="n">lg · 14</span></div>
  <div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><span class="n">xl · 22</span></div>
  <div class="c"><div class="b" style="border-radius:var(--radius-pill)"></div><span class="n">pill</span></div>
 </div>
</body></html>
