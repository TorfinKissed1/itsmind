<!-- @dsCard group="Colors" viewport="700x150" name="Ink scale" subtitle="Backgrounds & surfaces — near-black canvas" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);font-family:var(--font-mono);padding:20px 22px}
 .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
 .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;color:var(--fog-300);font-size:10px;letter-spacing:.05em}
 .cap{display:flex;justify-content:space-between;margin-top:10px;color:var(--text-muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
</style></head><body>
 <div class="row">
  <div class="sw" style="background:var(--ink-1000)">1000</div>
  <div class="sw" style="background:var(--ink-900)">900</div>
  <div class="sw" style="background:var(--ink-800)">800</div>
  <div class="sw" style="background:var(--ink-700)">700</div>
  <div class="sw" style="background:var(--ink-600)">600</div>
  <div class="sw" style="background:var(--ink-500)">500</div>
  <div class="sw" style="background:var(--ink-400)">400</div>
  <div class="sw" style="background:var(--ink-300)">300</div>
 </div>
 <div class="cap"><span>--ink-1000 · #050507</span><span>base #08080A → elevated</span></div>
</body></html>
