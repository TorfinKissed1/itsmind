<!-- @dsCard group="Type" viewport="700x170" name="Mono — JetBrains Mono" subtitle="Kickers, indices, prices, labels — uppercase, tracked" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);padding:22px 24px}
 .lbl{font-family:var(--font-mono);color:var(--text-muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 16px}
 .k{font-family:var(--font-mono);font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-secondary);display:flex;align-items:center;gap:12px;margin-bottom:14px}
 .k b{color:var(--accent);font-weight:500}
 .row{display:flex;gap:26px;font-family:var(--font-mono);align-items:baseline}
 .row .idx{color:var(--accent);font-size:26px}
 .row .pr{font-size:15px}
</style></head><body>
 <p class="lbl">Mono · JetBrains Mono · 400 / 500</p>
 <div class="k"><b>01</b> Почему сайты молчат</div>
 <div class="row">
  <span class="idx">02</span><span class="idx">03</span>
  <span class="pr">от <b style="color:var(--accent)">15 000 ₽</b></span>
  <span class="pr">1500 ₽/час</span>
 </div>
</body></html>
