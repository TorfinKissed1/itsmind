<!-- @dsCard group="Type" viewport="700x190" name="Display — Unbounded" subtitle="Headlines & the wow voice. Tight, often huge" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);padding:22px 24px}
 .lbl{font-family:var(--font-mono);color:var(--text-muted);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 10px}
 .big{font-family:var(--font-display);font-weight:700;font-size:64px;line-height:.95;letter-spacing:-.03em;margin:0}
 .big em{font-style:italic;color:var(--accent);text-shadow:var(--glow-text)}
 .meta{font-family:var(--font-mono);color:var(--text-secondary);font-size:11px;margin-top:14px;letter-spacing:.04em}
</style></head><body>
 <p class="lbl">Display · Unbounded · 700</p>
 <p class="big">Сайты, <em>которые работают</em></p>
 <p class="meta">--font-display · weights 300–900 · letter-spacing −0.02 to −0.05em · line-height 0.92–1.12</p>
</body></html>
