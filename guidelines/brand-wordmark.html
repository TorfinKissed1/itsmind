<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="lstmind. — lowercase, trailing period, accent dot" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);color:var(--text-primary);padding:28px;display:flex;align-items:center;gap:40px;flex-wrap:wrap}
 .logo{font-family:var(--font-display);font-weight:800;font-size:56px;letter-spacing:-.03em}
 .logo b{color:var(--accent);text-shadow:var(--glow-text)}
 .small{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.02em}
 .small b{color:var(--accent)}
 .note{font-family:var(--font-mono);font-size:10.5px;color:var(--text-muted);letter-spacing:.06em;max-width:24ch;line-height:1.7}
</style></head><body>
 <div>
  <div class="logo">lstmind<b>.</b></div>
  <div class="small" style="margin-top:14px">lstmind<b>.</b></div>
 </div>
 <p class="note">Always lowercase. The trailing period carries the accent (the brand's "one light source"). Pairs with the mono tagline “веб-разработчик · сайты, которые работают”.</p>
</body></html>
