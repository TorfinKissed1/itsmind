<!-- @dsCard group="Colors" viewport="700x150" name="Fog scale" subtitle="Text & on-dark neutrals — off-white to muted" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);font-family:var(--font-mono);padding:20px 22px}
 .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
 .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;color:var(--ink-900);font-size:10px;letter-spacing:.05em}
 .cap{display:flex;justify-content:space-between;margin-top:10px;color:var(--text-muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
</style></head><body>
 <div class="row">
  <div class="sw" style="background:var(--fog-000)">000</div>
  <div class="sw" style="background:var(--fog-100)">100</div>
  <div class="sw" style="background:var(--fog-200)">200</div>
  <div class="sw" style="background:var(--fog-300)">300</div>
  <div class="sw" style="background:var(--fog-400);color:var(--fog-000)">400</div>
  <div class="sw" style="background:var(--fog-500);color:var(--fog-000)">500</div>
  <div class="sw" style="background:var(--fog-600);color:var(--fog-000)">600</div>
 </div>
 <div class="cap"><span>--fog-100 primary text</span><span>--fog-400 secondary · --fog-500 muted</span></div>
</body></html>
