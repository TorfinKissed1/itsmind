<!-- @dsCard group="Spacing" viewport="700x170" name="Glow & elevation" subtitle="Depth = neon glow + hairline, not gray shadow" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
 html,body{margin:0}body{background:var(--bg-base);padding:26px 24px;font-family:var(--font-mono)}
 .row{display:flex;gap:22px}
 .c{display:flex;flex-direction:column;align-items:center;gap:12px}
 .b{width:120px;height:60px;border-radius:var(--radius-md);background:var(--surface-card);border:1px solid var(--border);display:grid;place-items:center;color:var(--text-secondary);font-size:10px;letter-spacing:.08em}
 .n{font-size:9.5px;color:var(--text-muted);letter-spacing:.06em}
</style></head><body>
 <div class="row">
  <div class="c"><div class="b" style="box-shadow:var(--glow-sm);border-color:var(--accent)">glow-sm</div><span class="n">hover</span></div>
  <div class="c"><div class="b" style="box-shadow:var(--glow-md);border-color:var(--accent)">glow-md</div><span class="n">active CTA</span></div>
  <div class="c"><div class="b" style="box-shadow:var(--glow-lg);border-color:var(--accent)">glow-lg</div><span class="n">focal</span></div>
  <div class="c"><div class="b" style="box-shadow:var(--shadow-lg)">shadow-lg</div><span class="n">floating panel</span></div>
 </div>
</body></html>
